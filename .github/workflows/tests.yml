name: Tests

on:
  push:
    branches: [main, master, develop, 2.x]
  pull_request:
    branches: [main, master, develop, 2.x]

jobs:
  unit-feature:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        php: [8.5]
        laravel: [12.*]
        livewire: [4.*]
        stability: [prefer-stable]
        include:
          - laravel: 12.*
            testbench: 10.*

    name: Unit & Feature - PHP ${{ matrix.php }} - Livewire ${{ matrix.livewire }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: xdebug

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "livewire/livewire:${{ matrix.livewire }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Execute unit and feature tests
        run: ./vendor/bin/testbench package:test --parallel --testsuite=Unit,Feature

  browser:
    runs-on: ubuntu-latest
    needs: unit-feature
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        php: [8.5]
        laravel: [12.*]
        livewire: [4.*]
        stability: [prefer-stable]
        include:
          - laravel: 12.*
            testbench: 10.*

    name: Browser Tests - Livewire ${{ matrix.livewire }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "livewire/livewire:${{ matrix.livewire }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install npm dependencies and build assets
        run: |
          npm ci
          npm run build

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('./node_modules/playwright/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright chromium binary
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 8
        run: |
          for attempt in 1 2 3; do
            npx playwright install chromium && exit 0
            echo "playwright install attempt $attempt failed, retrying in 10s"
            sleep 10
          done
          exit 1

      - name: Install Playwright system deps
        timeout-minutes: 5
        run: sudo npx playwright install-deps chromium

      - name: Execute browser tests
        timeout-minutes: 15
        run: ./vendor/bin/testbench package:test --parallel --testsuite=Browser

      - name: Upload browser test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-test-artifacts-livewire-${{ matrix.livewire }}
          path: |
            tests/Browser/.screenshots
            storage/logs
          retention-days: 7

  code-style:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: Code Style

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Check code style
        run: vendor/bin/pint --test
