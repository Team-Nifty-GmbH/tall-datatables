name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  tests:
    runs-on: self-hosted

    strategy:
      fail-fast: false
      matrix:
        php: [8.4, 8.5]
        laravel: [12.*]
        livewire: [3.*, 4.*]
        stability: [prefer-stable]
        include:
          - laravel: 12.*
            testbench: 10.*

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - Livewire ${{ matrix.livewire }} - ${{ matrix.stability }}

    container:
      image: ghcr.io/team-nifty-gmbh/flux-ci:php${{ matrix.php }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "livewire/livewire:${{ matrix.livewire }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Install npm dependencies and build assets
        run: |
          npm ci
          npm run build

      - name: Execute tests
        run: ./vendor/bin/testbench package:test --ci --parallel

      - name: Upload browser test artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: browser-test-artifacts-php-${{ matrix.php }}-livewire-${{ matrix.livewire }}
          path: |
            Tests/Browser/Screenshots
            storage/logs
          retention-days: 7

  code-style:
    runs-on: self-hosted
    name: Code Style

    container:
      image: ghcr.io/team-nifty-gmbh/flux-ci:php8.5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Check code style
        run: vendor/bin/pint --test
